<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
</head>
<body>
    <div class="container">

    </div>

    <header>

        <div class="logo-container">
          <img src="assets/images/Logo.png" alt="Logo">
          <h2>Character Counter</h2>
        </div>

        <button class="theme-toggle">
          <span>☀</span>
        </button>

    </header>

    <section class="hero">

       <h1>
           Analyze your text
           <br>
           in real-time.
       </h1>
        <textarea>Design is the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every interaction.</textarea>
        <div class="controls">
           <div class="left-controls">
              <label>
                <input type="checkbox">
                Exclude Spaces
              </label>

              <label>
                <input type="checkbox">
                Set Character Limit
              </label>
           </div>

           <span>Approx. reading time: &lt;1 minute</span>
        </div>

    </section>

    <section class="stats">

        
    </section>



</body>
</html>
