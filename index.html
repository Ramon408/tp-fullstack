<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
</head>
<body>
    <div class="container"></div>

    <header>

        <div class="logo-container">
          <img src="assets/images/Logo.png" alt="Logo">
          <h2>Character Counter</h2>
        </div>

        <button class="theme-toggle">
          <span>☀</span>
        </button>

    </header>

    <section class="hero">

       <h1>
           Analyze your text
           <br>
           in real-time.
       </h1>
        <textarea>Design is the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every interaction.</textarea>
        <div class="controls">
           <div class="left-controls">
              <label>
                <input type="checkbox">
                Exclude Spaces
              </label>

              <label>
                <input type="checkbox">
                Set Character Limit
              </label>
           </div>

           <span>Approx. reading time: &lt;1 minute</span>
        </div>

    </section>

    <section class="stats">

        <div class="card purple">
            <h2>278</h2>
            <p>Total Characters</p>
        </div>

        <div class="card orange">
            <h2>39</h2>
            <p>Word Count</p>
        </div>

        <div class="card coral">
            <h2>04</h2>
            <p>Sentence Count</p>
        </div>

    </section>

    <section class="density">

        <h2>Letter Density</h2>
        
        <div class="row">
            <span>E</span>
            <div class="bar">
               <div class="fill" style="width:40%"></div>
            </div>
            <span>40 (16.06%)</span>
        </div>

        <div class="row">
            <span>I</span>
            <div class="bar">
                 <div class="fill" style="width:29%"></div>
            </div>
            <span>29 (11.65%)</span>
        </div>

        <div class="row">
            <span>T</span>
            <div class="bar">
               <div class="fill" style="width:28%"></div>
            </div>
            <span>28 (11.24%)</span>
        </div>

       <div class="row">
            <span>O</span>
            <div class="bar">
                <div class="fill" style="width:22%"></div>
            </div>
            <span>22 (8.84%)</span>
       </div>

       <div class="row">
            <span>N</span>
            <div class="bar">
               <div class="fill" style="width:21%"></div>
            </div>
            <span>21 (8.43%)</span>
       </div>

       <div class="see-more">
            <button class="see-more-btn">
               See more
               <span class="arrow">˅</span>
            </button>
       </div>
    
    </section>
</div>
</body>
</html>
